# Cross-core conformance gate (ADR-0028).
#
# conformance: every enabled native core runs the shared vectors and must agree
#   byte-for-byte. The C++ reference, the TypeScript core (#56) and the native Rust
#   core (#57) are all enabled (tests/conformance/harnesses.json), so this is a real
#   three-core cross-match — a DISAGREE fails CI.
#
# The in-process latency/throughput gate moved to perf.yml: it is path-filtered to
# core/bench/CMake changes and compares against a baseline measured on the SAME runner
# (no cross-runner jitter), so it no longer false-fails docs/TS/packaging-only PRs.
name: conformance

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # The native Rust core (#57) runs as a cargo example; the driver builds it on
      # demand, so the toolchain must be present before run-all.py / diff_fuzz.py.
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo (Rust core build)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bindings/rust/target
          key: cargo-${{ runner.os }}-${{ hashFiles('bindings/rust/Cargo.toml', 'bindings/rust/src/**', 'bindings/rust/examples/**', 'bindings/rust/tests/**') }}
          restore-keys: cargo-${{ runner.os }}-
      - name: Build the C++ conformance harness (C++23)
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build core/build --target conformance_runner -j
      - name: Cross-core conformance driver (C++ + TypeScript + Rust must agree)
        env:
          LIBTRACER_CXX_HARNESS: ${{ github.workspace }}/core/build/tests/conformance_runner
        run: python3 tests/conformance/run-all.py
      - name: Cross-core differential fuzzer (random valid frames, all 3 cores agree)
        env:
          LIBTRACER_CXX_HARNESS: ${{ github.workspace }}/core/build/tests/conformance_runner
        run: python3 tests/conformance/diff_fuzz.py -n 2000
      # The Rust binding's in-crate suite (typed builders/PATH/ERROR/FWD/FIELD/
      # structured + the structural check that loads each vector's input.bin AND
      # expected.json). The cross-core driver above only exercises the round-trip
      # example; this gates the typed-decode semantics so they can't rot.
      - name: Rust binding in-crate tests (typed codec + structural vectors)
        working-directory: bindings/rust
        run: cargo test
