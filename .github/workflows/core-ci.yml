#
# Core C++23 reference implementation CI: build + ctest, clang-format, and the
# strict Doxygen documentation gate. Keeps `main` green on every change to core/.
name: core-ci

on:
  push:
    branches: [main]
    paths: ["core/**", "tests/packaging/**", ".github/workflows/core-ci.yml"]
  pull_request:
    paths: ["core/**", "tests/packaging/**", ".github/workflows/core-ci.yml"]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Configure + build (C++23) + ctest
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build core/build -j
          ctest --test-dir core/build --output-on-failure

  # GCC-15 host gate: build the core + ctest with GCC 15 (the same major the
  # ESP-IDF v6.0 RISC-V toolchain ships), so the core is gated on the compiler
  # the MCU actually uses — catches toolchain-version-specific issues (e.g. the
  # FNV-1a 64-bit-constant overflow on 32-bit size_t GCC 15 newly -Werror's).
  # GCC 15 is not in ubuntu-24.04's default repos; the toolchain test PPA carries it.
  build-test-gcc15:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install g++-15
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++-15 gcc-15
      - name: Configure + build (C++23, GCC 15) + ctest
        env:
          CC: gcc-15
          CXX: g++-15
        run: |
          cmake -S core -B core/build-gcc15 -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=gcc-15 -DCMAKE_CXX_COMPILER=g++-15
          cmake --build core/build-gcc15 -j
          ctest --test-dir core/build-gcc15 --output-on-failure

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: ASan + UBSan build + ctest
        run: |
          cmake -S core -B core/build-asan -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -g"
          cmake --build core/build-asan -j
          # ASLR can make ASan/TSan abort in this runner; pin it off.
          setarch "$(uname -m)" -R ctest --test-dir core/build-asan --output-on-failure

  tsan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: ThreadSanitizer build + ctest (graph concurrency)
        run: |
          cmake -S core -B core/build-tsan -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g -O1"
          cmake --build core/build-tsan -j
          setarch "$(uname -m)" -R ctest --test-dir core/build-tsan --output-on-failure

  # Regression guard for the CMake install/export (find_package packaging). Builds
  # + installs core to a staging prefix, then configures the tests/packaging fixture
  # SEPARATELY against that prefix — the real downstream flow: find_package(libtracer)
  # + link libtracer::libtracer + include a public header + call a compiled symbol.
  # Catches broken install rules, a malformed package config, or a missing exported
  # target before they reach a consumer.
  install-consume:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build + install core to a staging prefix
        run: |
          cmake -S core -B core/build-install -DBUILD_TESTING=OFF -DCMAKE_BUILD_TYPE=Release
          cmake --build core/build-install -j
          cmake --install core/build-install --prefix "${RUNNER_TEMP}/prefix"
      - name: Consume via find_package(libtracer)
        run: |
          cmake -S tests/packaging -B "${RUNNER_TEMP}/consumer" \
            -DCMAKE_PREFIX_PATH="${RUNNER_TEMP}/prefix"
          cmake --build "${RUNNER_TEMP}/consumer" -j
          "${RUNNER_TEMP}/consumer/app"

  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: clang-format (dry-run, error on diff)
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          mapfile -t files < <(find core/include core/src core/tests core/examples \
            tests/packaging -name '*.hpp' -o -name '*.cpp')
          clang-format --dry-run --Werror "${files[@]}"

  doxygen-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Doxygen strict gate (undocumented public symbol = failure)
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen
          doxygen core/Doxyfile
