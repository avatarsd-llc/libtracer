#
# Build the Sphinx documentation and deploy it to GitHub Pages. Pull requests
# build only (to verify); pushes to main build and deploy.
#
# One-time setup: in the repository settings, set Pages → Build and deployment →
# Source = "GitHub Actions".
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "bench/**"
      - "tests/conformance/**"
      - "core/include/**" # public headers feed the Doxygen source refs
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "bench/**"
      - "tests/conformance/**"
      - "core/include/**"
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write # post the libtracer-vs-Zenoh absolute comparison as a PR comment

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen unzip
          pip install -r docs/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # rust-core's codec perf bench (`cargo run --release --example perf`) feeds the
      # cross-core matrix in gen_results_page.py; without a toolchain that row would
      # degrade to an "unavailable" note on the live page (ADR-0032 §auto-published).
      - uses: dtolnay/rust-toolchain@stable
      - name: API docs gate (Doxygen, strict — undocumented public symbol fails)
        run: doxygen core/Doxyfile
      # Auto-generate the Performance & Conformance page from the LIVE harnesses
      # (cross-core matrix + perf bench + coverage), replacing the static snapshot
      # (ADR-0032 §auto-published). Regenerated in-place each build; the artifact
      # that deploys carries the fresh page. All three codec cores must render live:
      # cpp-core (bench_codec), ts-core (node perf.mjs — runs directly under node 22,
      # no install/build needed; it imports src/*.mjs, not the dist build), and
      # rust-core (cargo --example perf, via the rust-toolchain step above).
      - name: Build harnesses for the results page
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build core/build -j          # all test targets, for the live test report
          bash bench/fetch_zenoh.sh || echo "zenoh fetch failed — comparison will be omitted"
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_codec bench_forward_heap bench_transports -j
          # zenoh is optional: build it separately so a missing/failed vendor never breaks
          # the docs deploy (the comparison degrades to a note; libtracer numbers stand).
          cmake --build bench/build --target bench_zenoh bench_zenoh_net -j || echo "bench_zenoh unavailable — comparison omitted"
      # Run the libtracer-vs-Zenoh sweep ONCE here; both the docs page and the PR comment
      # consume this file (LIBTRACER_COMPARE_TSV) so the ~40s sweep isn't paid twice.
      - name: Run the libtracer-vs-Zenoh comparison sweep
        run: |
          out="${RUNNER_TEMP}/compare.tsv"
          { ./bench/build/bench_libtracer grid; ./bench/build/bench_zenoh grid; } >"$out" 2>/dev/null || true
          # Network transports (UDP/TCP) — two-process pub/sub over real loopback sockets,
          # the SAME topology for both engines. Best-effort; never fails the build (a chart
          # is simply omitted if a transport doesn't come up).
          bash bench/run_net.sh >>"$out" 2>/dev/null || true
      - name: Generate live performance + conformance page
        env:
          LIBTRACER_CXX_HARNESS: ${{ github.workspace }}/core/build/tests/conformance_runner
          LIBTRACER_COMPARE_TSV: ${{ runner.temp }}/compare.tsv
        run: python3 bench/gen_results_page.py
      # Absolute-number comparison table, upserted as a single sticky PR comment (option
      # "publish result to pr"). Absolute values only — the full interactive charts land
      # on the Performance page after merge.
      - name: Post the absolute comparison on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');
            const tsv = process.env.RUNNER_TEMP + '/compare.tsv';
            let table;
            try {
              table = execSync('python3 bench/render_compare.py --md', { input: fs.readFileSync(tsv), encoding: 'utf8' });
            } catch (e) { core.warning('comparison sweep produced no data; skipping PR comment'); return; }
            const marker = '<!-- ltz-compare -->';
            const body = `${marker}\n### 📊 libtracer vs Zenoh — absolute (this run)\n\n`
              + `Measured on this CI runner, both engines \`-O3\` in the same pass. Absolute values, no ratios — `
              + `shared-runner variance is real, read trends not the third digit. Interactive charts land on the `
              + `[Performance page](https://avatarsd-llc.github.io/libtracer/docs/performance.html) after merge.\n\n`
              + table;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
      - name: Generate live test report (ctest across every suite)
        run: python3 bench/gen_test_report.py
      - name: Build (sphinx-build, config in docs/, source = repo root)
        run: sphinx-build -b html -c docs . docs/_build/html
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
