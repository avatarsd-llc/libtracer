#
# Build the Sphinx documentation and deploy it to GitHub Pages. Pull requests
# build only (to verify); pushes to main build and deploy.
#
# One-time setup: in the repository settings, set Pages → Build and deployment →
# Source = "GitHub Actions".
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "core/include/**" # public headers feed the Doxygen source refs
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "core/include/**"
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen
          pip install -r docs/requirements.txt
      - name: API docs gate (Doxygen, strict — undocumented public symbol fails)
        run: doxygen core/Doxyfile
      - name: Build (sphinx-build, config in docs/, source = repo root)
        run: sphinx-build -b html -c docs . docs/_build/html
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
