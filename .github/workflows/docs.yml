#
# Build the Sphinx documentation and deploy it to GitHub Pages. Pull requests
# build only (to verify); pushes to main build and deploy.
#
# One-time setup: in the repository settings, set Pages → Build and deployment →
# Source = "GitHub Actions".
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "*.md"
      - "bench/**"
      - "tests/conformance/**"
      - "core/include/**" # public headers feed the Doxygen source refs
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "*.md"
      - "bench/**"
      - "tests/conformance/**"
      - "core/include/**"
      - "core/Doxyfile"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: docs/requirements.txt
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y doxygen
          pip install -r docs/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # rust-core's codec perf bench (`cargo run --release --example perf`) feeds the
      # cross-core matrix in gen_results_page.py; without a toolchain that row would
      # degrade to an "unavailable" note on the live page (ADR-0032 §auto-published).
      - uses: dtolnay/rust-toolchain@stable
      - name: API docs gate (Doxygen, strict — undocumented public symbol fails)
        run: doxygen core/Doxyfile
      # Auto-generate the Performance & Conformance page from the LIVE harnesses
      # (cross-core matrix + perf bench + coverage), replacing the static snapshot
      # (ADR-0032 §auto-published). Regenerated in-place each build; the artifact
      # that deploys carries the fresh page. All three codec cores must render live:
      # cpp-core (bench_codec), ts-core (node perf.mjs — runs directly under node 22,
      # no install/build needed; it imports src/*.mjs, not the dist build), and
      # rust-core (cargo --example perf, via the rust-toolchain step above).
      - name: Build harnesses for the results page
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build core/build --target conformance_runner -j
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_codec -j
      - name: Generate live performance + conformance page
        env:
          LIBTRACER_CXX_HARNESS: ${{ github.workspace }}/core/build/tests/conformance_runner
        run: python3 bench/gen_results_page.py
      - name: Build (sphinx-build, config in docs/, source = repo root)
        run: sphinx-build -b html -c docs . docs/_build/html
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
