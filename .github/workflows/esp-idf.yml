#
# On-silicon build gate for the integrations/esp-idf component. Builds the
# inprocess_mirror example (the libtracer P0 in-process profile) for a real
# RISC-V target inside the official espressif/idf Docker image. A clean
# `idf.py build` (a produced .bin/.elf, no errors) IS the gate — it proves
# libtracer's L0/L1/L2/L4 core compiles and links as an ESP-IDF managed
# component on single-core FreeRTOS, including the <atomic> segment-refcount path.
#
# This is a SEPARATE, standalone workflow (mirroring can-vcan-e2e.yml): the
# required core gates (build-test / sanitizers / format / doxygen) must never
# depend on the multi-GB ESP-IDF toolchain image. esp32c6 is the required
# target; esp32c3 is matrixed as a second RISC-V single-core check.
name: esp-idf

on:
  push:
    branches: [main]
    paths:
      - "integrations/esp-idf/**"
      - "core/src/**"
      - "core/include/**"
      - ".github/workflows/esp-idf.yml"
  pull_request:
    paths:
      - "integrations/esp-idf/**"
      - "core/src/**"
      - "core/include/**"
      - ".github/workflows/esp-idf.yml"
  workflow_dispatch:

# ── Footprint sentinel thresholds (full-node job) ────────────────────────────
# ⚠️ PLACEHOLDER VALUES — deliberately generous, NOT measured. No local IDF v6.0
# toolchain was available when this sentinel was wired, so these bound nothing
# yet: LIBTRACER_SENTINEL_MODE is "warn" (over-threshold prints a ::warning::
# annotation, never fails the job). After the first CI run, read the measured
# component numbers from the full-node job's step summary (or the
# footprint-<target> artifact), TIGHTEN the two byte limits to measured value
# + ~10 % headroom, and flip LIBTRACER_SENTINEL_MODE to "fail" so a footprint
# regression turns the job red. Thresholds gate the libtracer component archive
# (liblibtracer.a) only, not the whole app image.
env:
  LIBTRACER_MAX_FLASH_BYTES: 524288 # 512 KiB — placeholder, tighten from CI
  LIBTRACER_MAX_STATIC_RAM_BYTES: 65536 # 64 KiB — placeholder, tighten from CI
  LIBTRACER_SENTINEL_MODE: warn # flip to "fail" once thresholds are measured

jobs:
  build:
    runs-on: ubuntu-24.04
    # Pinned ESP-IDF v6.0 release (GCC 15 RISC-V toolchain — C++23: std::expected,
    # std::span; matches strawberry-fw's IDF v6.0-dev toolchain). Bumped from v5.3/GCC13.
    container: espressif/idf:release-v6.0
    strategy:
      fail-fast: false
      matrix:
        target: [esp32c6, esp32c3]
    steps:
      - uses: actions/checkout@v4

      - name: Build inprocess_mirror (P0 in-process component) for ${{ matrix.target }}
        shell: bash
        working-directory: integrations/esp-idf/examples/inprocess_mirror
        # The container ships the IDF tools; source the export script, then build.
        run: |
          . "${IDF_PATH}/export.sh"
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Show build artifacts
        if: always()
        shell: bash
        working-directory: integrations/esp-idf/examples/inprocess_mirror
        run: |
          ls -la build/*.bin build/*.elf 2>/dev/null || true

  # Full-node gate (#183): build the full_node example — the FULL component
  # (net plane: fwd_router / transport_vertex / udp / tcp / ws / transport_can
  # + the TWAI can_link_t) — for both RISC-V targets. A clean `idf.py build`
  # proves the whole net plane compiles and links against lwIP BSD sockets and
  # esp_driver_twai on single-core FreeRTOS; the runtime proof is the linux-
  # target run below (full-node-host), and bus-/radio-level validation is the
  # on-silicon checklist on #183.
  full-node:
    runs-on: ubuntu-24.04
    container: espressif/idf:release-v6.0
    strategy:
      fail-fast: false
      matrix:
        target: [esp32c6, esp32c3]
    steps:
      - uses: actions/checkout@v4

      - name: Build full_node (full-node component) for ${{ matrix.target }}
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        run: |
          . "${IDF_PATH}/export.sh"
          idf.py set-target ${{ matrix.target }}
          idf.py build

      # Footprint report + sentinel (docs/reference/00-overview.md "build-size
      # sentinel"; numbers referenced by integrations/esp-idf/README.md). Prints
      # the per-component breakdown to the log, publishes a markdown table to
      # the step summary, uploads a JSON artifact, and gates the libtracer
      # component's flash / static-RAM contribution (thresholds: workflow env).
      - name: Report footprint (idf.py size / size-components)
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        run: |
          ls -la build/*.bin build/*.elf
          . "${IDF_PATH}/export.sh"
          idf.py size
          idf.py size-components

      - name: Extract footprint JSON (esp-idf-size)
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        run: |
          . "${IDF_PATH}/export.sh"
          MAP=$(find build -maxdepth 1 -name '*.map' | head -n1)
          # esp-idf-size NG (>= 2.0, IDF v6.0) speaks json2; older images speak
          # the legacy json — try NG first, fall back.
          python -m esp_idf_size --format json2 --archives "$MAP" > size_components.json ||
            python -m esp_idf_size --format json --archives "$MAP" > size_components.json
          python -m esp_idf_size --format json2 "$MAP" > size_summary.json ||
            python -m esp_idf_size --format json "$MAP" > size_summary.json

      - name: Footprint sentinel (step summary + component-size gate)
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        run: |
          python3 "${GITHUB_WORKSPACE}/tools/esp_size_gate.py" \
            --components-json size_components.json \
            --summary-json size_summary.json \
            --target "${{ matrix.target }}" \
            --max-flash-bytes "${LIBTRACER_MAX_FLASH_BYTES}" \
            --max-static-ram-bytes "${LIBTRACER_MAX_STATIC_RAM_BYTES}" \
            --mode "${LIBTRACER_SENTINEL_MODE}" \
            --out-json "footprint-${{ matrix.target }}.json"

      - name: Upload footprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: footprint-${{ matrix.target }}
          path: integrations/esp-idf/examples/full_node/footprint-${{ matrix.target }}.json

  # Full-node HOST run (#183): the same full_node example on the ESP-IDF
  # `linux` target, executed — the device node and an in-process host peer talk
  # over REAL loopback datagrams (config-created udp connections via
  # :children[] SPECs), driving read / subscribe / latch / fan-out / await end
  # to end. This is the runtime proof CI can give without silicon. Same v5.3 +
  # g++-12 arrangement as host-build (see the NOTE there re v6.0 linux target).
  full-node-host:
    runs-on: ubuntu-24.04
    container: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Install g++-12 (C++23 <expected> for the host/linux toolchain)
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq g++-12 gcc-12

      - name: Build full_node for the linux target
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        env:
          CC: gcc-12
          CXX: g++-12
        run: |
          . "${IDF_PATH}/export.sh"
          idf.py -D CMAKE_C_COMPILER=gcc-12 -D CMAKE_CXX_COMPILER=g++-12 \
            --preview set-target linux build

      - name: Run full_node (device node + host peer over real datagrams)
        shell: bash
        working-directory: integrations/esp-idf/examples/full_node
        run: |
          ls -la build/full_node.elf
          ./build/full_node.elf

  # Host-target gate: build the host_smoke example for the ESP-IDF `linux`
  # (POSIX host) target — proves the ESP-IDF *component* packages the core for a
  # host consumer (manifest target `linux`), distinct from core-ci.yml's plain
  # host build of the core. The host/linux target uses the container's native g++;
  # we pin g++-12 (C++23 <expected>) so the build is independent of the image's
  # default. A produced ELF that runs register/write/read IS the gate.
  #
  # NOTE: still on release-v5.3. The v6.0 `linux` target fails component
  # resolution (esp_driver_ana_cmpr → esp_hal_ana_cmpr, a chip-specific HAL not
  # registered for linux) — an IDF v6.0 linux-target issue, not libtracer. The
  # GCC-15 host gate now lives in core-ci.yml (build-test-gcc15), where a plain
  # host build of the core belongs; migrate this IDF-component example to v6.0
  # once an IDF patch fixes the linux component graph.
  host-build:
    runs-on: ubuntu-24.04
    container: espressif/idf:release-v5.3
    steps:
      - uses: actions/checkout@v4

      - name: Install g++-12 (C++23 <expected> for the host/linux toolchain)
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq g++-12 gcc-12

      - name: Build host_smoke (P0 in-process component) for the linux target
        shell: bash
        working-directory: integrations/esp-idf/examples/host_smoke
        env:
          CC: gcc-12
          CXX: g++-12
        run: |
          . "${IDF_PATH}/export.sh"
          idf.py -D CMAKE_C_COMPILER=gcc-12 -D CMAKE_CXX_COMPILER=g++-12 \
            --preview set-target linux build

      - name: Run host_smoke (register / write / read)
        shell: bash
        working-directory: integrations/esp-idf/examples/host_smoke
        run: |
          ls -la build/host_smoke.elf
          ./build/host_smoke.elf

      - name: Show build artifacts
        if: always()
        shell: bash
        working-directory: integrations/esp-idf/examples/host_smoke
        run: |
          ls -la build/*.elf 2>/dev/null || true

