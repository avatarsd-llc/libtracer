# In-process latency/throughput gate (bench/perf_gate.py) — split out of conformance.yml.
#
# Design (all comparisons are SAME-RUNNER, because GitHub-hosted runners vary ~2x in
# absolute speed — cross-runner nanoseconds cannot gate):
#
#  1. Path filter — perf only runs when performance can actually change: C++ core, the
#     bench harness, CMake, or this workflow. A PR touching only bindings/typescript/**,
#     docs/**, packaging, etc. does NOT run perf.
#  2. PR gate (`gate-pr`) — main's bench_libtracer and the PR's bench_libtracer are BOTH
#     built and timed on the SAME runner in one job; only a real relative regression
#     (p50 +15% / mean +12% / throughput -12%, best-of-3 runs) fails. perf_gate.py
#     keeps its absolute-floor backstop. No Actions cache feeds the gate.
#  3. Push ratchet (`ratchet`) — every main push re-runs the same gate on THREE
#     independently-drawn runners (redundant testing): each replica builds HEAD and its
#     PARENT commit and gates HEAD against the parent on its own hardware. A pullback
#     that lands anyway turns main red — and a single slow/noisy runner cannot
#     manufacture a false verdict, because the other two replicas measured the same
#     pair of commits on different machines.
#  4. History (`history`) — aggregates the three replicas' transcripts and records the
#     BEST across runners per metric (min latency / max throughput), so the recorded
#     trend approximates the code's capability, not the machine lottery.
name: perf

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'

jobs:
  # --- PR gate: same-runner baseline against main --------------------------------
  gate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need origin/main history to build the same-runner baseline
      - name: Build the PR (candidate) benchmark (Release)
        run: |
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_forward_heap -j
      # A hard, absolute gate (no baseline needed): the FWD forward hop MUST allocate
      # zero heap (ADR-0038 §16KB-RAM), measured by a global operator-new counter.
      - name: Zero-heap forward gate (ADR-0038 §16KB-RAM)
        run: ZEROHEAP_MAX=0 ./bench/build/bench_forward_heap
      # Build main's bench_libtracer in a worktree on THIS runner, record its numbers
      # as the baseline, then gate the PR's numbers against it. Same hardware, same
      # job -> absolute-ns runner speed cancels; only a real regression fails.
      - name: Build main's benchmark on this runner (baseline)
        run: |
          git fetch --no-tags origin main
          git worktree add --detach ../main-baseline origin/main
          cmake -S ../main-baseline/bench -B ../main-baseline/bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ../main-baseline/bench/build --target bench_libtracer bench_forward_heap -j
      - name: Performance gate (same-runner main baseline)
        run: |
          echo "== record main (baseline) on this runner =="
          python3 bench/perf_gate.py --bench ../main-baseline/bench/build/bench_libtracer \
            --bench-fwd ../main-baseline/bench/build/bench_forward_heap --update-baseline
          echo "== gate PR candidate against the same-runner baseline (latency + per-vertex memory) =="
          python3 bench/perf_gate.py

  # --- main push: REDUNDANT no-pullback ratchet (3 runners, HEAD vs parent) -------
  # Each replica is a complete same-runner experiment on independently-drawn hardware:
  # build HEAD, build the parent commit, gate HEAD against the parent. fail-fast is
  # off so one replica's verdict (or infrastructure hiccup) never hides the others'.
  ratchet:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        replica: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the parent commit for the ratchet baseline
      - name: Build HEAD's benchmark (Release)
        run: |
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_forward_heap -j
      # The zero-heap gate is deterministic (allocation counts, not time) — running it
      # per replica is a free consistency check; its transcript feeds the memory series.
      - name: Zero-heap forward gate (ADR-0038 §16KB-RAM)
        run: |
          set -o pipefail
          ZEROHEAP_MAX=0 ./bench/build/bench_forward_heap | tee bench/bench_forward_heap_raw.txt
      - name: Build the parent commit's benchmark on this runner (ratchet baseline)
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git worktree add --detach ../parent-baseline HEAD^
            cmake -S ../parent-baseline/bench -B ../parent-baseline/bench/build -DCMAKE_BUILD_TYPE=Release
            cmake --build ../parent-baseline/bench/build --target bench_libtracer bench_forward_heap -j
          else
            echo "root commit — no parent to ratchet against"
          fi
      - name: No-pullback ratchet (HEAD vs parent, this runner)
        run: |
          if [ -x ../parent-baseline/bench/build/bench_libtracer ]; then
            echo "== record the parent (ratchet baseline) on this runner =="
            python3 bench/perf_gate.py --bench ../parent-baseline/bench/build/bench_libtracer \
              --bench-fwd ../parent-baseline/bench/build/bench_forward_heap --update-baseline
            echo "== gate HEAD against its parent on the same runner (latency + per-vertex memory) =="
            python3 bench/perf_gate.py
          else
            echo "== no parent build — absolute floors only =="
            python3 bench/perf_gate.py --update-baseline
          fi
      # One full-bench transcript per replica; the history job aggregates all three.
      # GNU time -v: whole-run max RSS feeds the memory-footprint series. Degrades
      # to an empty transcript (metric omitted) if GNU time is absent on the runner.
      - name: Run the bench once (this replica's history transcript)
        run: |
          if [ -x /usr/bin/time ]; then
            /usr/bin/time -v ./bench/build/bench_libtracer \
              >bench/bench_libtracer_raw.txt 2>bench/bench_libtracer_time.txt
          else
            ./bench/build/bench_libtracer >bench/bench_libtracer_raw.txt
            : >bench/bench_libtracer_time.txt
          fi
      - name: Upload this replica's transcripts
        uses: actions/upload-artifact@v4
        with:
          name: bench-raw-r${{ matrix.replica }}
          path: |
            bench/bench_libtracer_raw.txt
            bench/bench_libtracer_time.txt
            bench/bench_forward_heap_raw.txt
          retention-days: 90

  # --- main push: persist the build-to-build history (best across runners) --------
  # Aggregates whatever replicas produced transcripts (if: always() — a failing
  # ratchet verdict must still leave a history point for the offending commit) and
  # records EVERY (mode,size,fan,ep) point — latency, throughput and memory footprint
  # as separate series — with a 125% soft alert that comments on drift.
  #
  # NOTE: the history + interactive chart live on the `gh-pages` BRANCH (github-
  # action-benchmark's store; machine-maintained — only this workflow writes it).
  # Pages source is "GitHub Actions" (docs.yml's Sphinx artifact), so the branch is
  # not served directly; docs.yml mirrors dev/bench/ from the branch into each
  # deploy, so the chart is served at https://libtracer.avatarsd.com/dev/bench/.
  history:
    if: github.event_name == 'push' && always()
    needs: ratchet
    runs-on: ubuntu-24.04
    # contents: write lets the tracker push the history to the gh-pages branch and
    # post a commit comment when a metric drifts past the soft alert.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download the replicas' transcripts
        uses: actions/download-artifact@v4
        with:
          pattern: bench-raw-r*
          path: bench/raws
      - name: Emit best-across-runners history metrics (github-action-benchmark JSON)
        run: |
          args=""
          for f in bench/raws/*/bench_libtracer_raw.txt; do
            [ -s "$f" ] && args="$args --raw $f"
          done
          if [ -z "$args" ]; then
            echo "no replica produced a transcript — nothing to record"; exit 1
          fi
          zh=$(ls bench/raws/*/bench_forward_heap_raw.txt 2>/dev/null | head -1)
          tv=$(ls bench/raws/*/bench_libtracer_time.txt 2>/dev/null | head -1)
          python3 bench/perf_emit_benchmark.py $args \
            ${zh:+--zeroheap-raw "$zh"} ${tv:+--time-v "$tv"} \
            --out-smaller bench/benchmark_output.json \
            --out-bigger bench/benchmark_throughput.json
      - name: Upload the aggregated bench results (rich per-commit record)
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench/raws
            bench/benchmark_output.json
            bench/benchmark_throughput.json
          retention-days: 90
      - name: Track latency + memory history + soft-alert on drift
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # Keep the historical suite name so the pre-existing ns series continue.
          name: libtracer in-process latency (ns, smaller is better)
          tool: customSmallerIsBetter
          output-file-path: bench/benchmark_output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '125%'      # tighter than the hard gate: catch creep
          comment-on-alert: true       # auto-comment on the commit that drifted
          fail-on-alert: false         # perf_gate.py remains the hard gate; this is a signal
          alert-comment-cc-users: '@avatarsd'
      - name: Track throughput history + soft-alert on drift
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # Separate suite: throughput in natural deliveries/s needs the opposite
          # direction (bigger is better); same gh-pages store, its own chart set.
          name: libtracer in-process throughput (deliveries/s, bigger is better)
          tool: customBiggerIsBetter
          output-file-path: bench/benchmark_throughput.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '125%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@avatarsd'
