# In-process latency/throughput gate (bench/perf_gate.py) — split out of conformance.yml.
#
# Two fixes over the old cross-build/Actions-cache gate (which false-failed packaging-,
# docs- and TS-only PRs, e.g. #121):
#
#  1. Path filter — perf only runs when performance can actually change: C++ core, the
#     bench harness, CMake, or this workflow. A PR touching only bindings/typescript/**,
#     docs/**, packaging, etc. does NOT run perf.
#  2. Same-runner baseline — on a PR, main's bench_libtracer and the PR's bench_libtracer
#     are BOTH built and timed on the SAME runner in this one job. main's numbers are
#     recorded as the baseline; the PR's are gated against it. GitHub-hosted runners vary
#     ~2x in speed, so a baseline recorded on a fast runner vs a slow PR runner used to
#     false-fail; measuring both here makes absolute-ns speed cancel — only a real
#     relative regression (p50 up >15% / throughput down >12%, best-of-3 runs) fails.
#     perf_gate.py keeps its absolute-floor backstop. No Actions cache feeds the gate.
#     Push runs ratchet HEAD against its PARENT commit the same way, so a pullback
#     that lands anyway turns main red immediately.
name: perf

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'

jobs:
  perf:
    runs-on: ubuntu-24.04
    # contents: write lets the build-to-build tracker (below) push the ns history to the
    # gh-pages branch and post a commit comment when a metric drifts past the soft alert.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need origin/main history to build the same-runner baseline
      - name: Build the PR (candidate) benchmark (Release)
        run: |
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_forward_heap -j

      # --- 16KB-RAM zero-heap forward gate (ADR-0038/0039) ------------------------
      # A hard, absolute gate (no baseline needed): the FWD forward hop MUST allocate
      # zero heap. Measured by a global operator-new counter armed around one steady-
      # state on_frame. Fails the build if the forward path ever allocates again.
      - name: Zero-heap forward gate (ADR-0038 §16KB-RAM)
        # tee: the probe's alloc/byte counts also feed the memory-footprint series of
        # the history tracker below (push runs) and the per-run raw-results artifact.
        run: |
          set -o pipefail
          ZEROHEAP_MAX=0 ./bench/build/bench_forward_heap | tee bench/bench_forward_heap_raw.txt

      # --- PR gate: same-runner baseline ------------------------------------------
      # Build main's bench_libtracer in a worktree on THIS runner, then record its
      # numbers as the baseline and gate the PR's numbers against it. Same hardware,
      # same job -> absolute-ns runner speed cancels; only a real regression fails.
      - name: Build main's benchmark on this runner (baseline)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main
          git worktree add --detach ../main-baseline origin/main
          cmake -S ../main-baseline/bench -B ../main-baseline/bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ../main-baseline/bench/build --target bench_libtracer -j
      - name: Performance gate (same-runner main baseline)
        if: github.event_name == 'pull_request'
        run: |
          echo "== record main (baseline) on this runner =="
          python3 bench/perf_gate.py --bench ../main-baseline/bench/build/bench_libtracer --update-baseline
          echo "== gate PR candidate against the same-runner baseline =="
          python3 bench/perf_gate.py

      # --- main push: no-pullback ratchet (same-runner, HEAD vs parent) ------------
      # The PR gate above catches a pullback before merge; this re-verifies it AFTER
      # merge against the actual parent commit on one runner — a merge that raises
      # p50 >15% or drops deliveries/s >12% vs its parent turns main red. Same-runner
      # comparison is the only noise-immune signal available (shared runners vary ~2x
      # in absolute speed, which is why the raw ns history chart alone can't gate).
      - name: Build the parent commit's benchmark on this runner (ratchet baseline)
        if: github.event_name == 'push'
        run: |
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            git worktree add --detach ../parent-baseline HEAD^
            cmake -S ../parent-baseline/bench -B ../parent-baseline/bench/build -DCMAKE_BUILD_TYPE=Release
            cmake --build ../parent-baseline/bench/build --target bench_libtracer -j
          else
            echo "root commit — no parent to ratchet against"
          fi
      - name: No-pullback ratchet (HEAD vs parent)
        if: github.event_name == 'push'
        run: |
          if [ -x ../parent-baseline/bench/build/bench_libtracer ]; then
            echo "== record the parent (ratchet baseline) on this runner =="
            python3 bench/perf_gate.py --bench ../parent-baseline/bench/build/bench_libtracer --update-baseline
            echo "== gate HEAD against its parent on the same runner =="
            python3 bench/perf_gate.py
          else
            echo "== no parent build — absolute floors only =="
            python3 bench/perf_gate.py --update-baseline
          fi

      # --- main push: persist the build-to-build ns history -----------------------
      # perf_gate.py above is the HARD, per-PR relative gate (fails a PR at >50%
      # latency / >34% throughput vs its same-runner main baseline). It does NOT keep a
      # durable series, so slow drift that stays under 50% across many commits is
      # invisible. These steps run the bench ONCE, archive the full raw transcript as a
      # per-commit artifact (the "rich" results), and record EVERY (mode,size,fan,ep)
      # point the run produces — latency, throughput and memory footprint as separate
      # series — to a persisted history with a TIGHTER 125% soft alert that comments on
      # the offending commit, catching creep the hard gate misses.
      #
      # NOTE: the history + interactive chart live on the `gh-pages` BRANCH (github-
      # action-benchmark's store; machine-maintained — only this workflow writes it).
      # Pages source is "GitHub Actions" (docs.yml's Sphinx artifact), so the branch is
      # not served directly; docs.yml mirrors dev/bench/ from the branch into each
      # deploy, so the chart is served at https://libtracer.avatarsd.com/dev/bench/.
      - name: Run the bench once (raw transcript kept as the per-commit artifact)
        if: github.event_name == 'push'
        # GNU time -v: whole-run max RSS feeds the memory-footprint series. Degrades
        # to an empty transcript (metric omitted) if GNU time is absent on the runner.
        run: |
          if [ -x /usr/bin/time ]; then
            /usr/bin/time -v ./bench/build/bench_libtracer \
              >bench/bench_libtracer_raw.txt 2>bench/bench_libtracer_time.txt
          else
            ./bench/build/bench_libtracer >bench/bench_libtracer_raw.txt
            : >bench/bench_libtracer_time.txt
          fi
      - name: Emit the bench as history metrics (github-action-benchmark JSON)
        if: github.event_name == 'push'
        run: >-
          python3 bench/perf_emit_benchmark.py
          --raw bench/bench_libtracer_raw.txt
          --zeroheap-raw bench/bench_forward_heap_raw.txt
          --time-v bench/bench_libtracer_time.txt
          --out-smaller bench/benchmark_output.json
          --out-bigger bench/benchmark_throughput.json
      - name: Upload the full raw bench results (rich per-commit record)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: |
            bench/bench_libtracer_raw.txt
            bench/bench_libtracer_time.txt
            bench/bench_forward_heap_raw.txt
            bench/benchmark_output.json
            bench/benchmark_throughput.json
          retention-days: 90
      - name: Track latency + memory history + soft-alert on drift
        if: github.event_name == 'push'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # Keep the historical suite name so the pre-existing ns series continue.
          name: libtracer in-process latency (ns, smaller is better)
          tool: customSmallerIsBetter
          output-file-path: bench/benchmark_output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '125%'      # tighter than perf_gate's 150% hard gate: catch creep
          comment-on-alert: true       # auto-comment on the commit that drifted
          fail-on-alert: false         # perf_gate.py remains the hard gate; this is a signal
          alert-comment-cc-users: '@avatarsd'
      - name: Track throughput history + soft-alert on drift
        if: github.event_name == 'push'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          # Separate suite: throughput in natural deliveries/s needs the opposite
          # direction (bigger is better); same gh-pages store, its own chart set.
          name: libtracer in-process throughput (deliveries/s, bigger is better)
          tool: customBiggerIsBetter
          output-file-path: bench/benchmark_throughput.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '125%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@avatarsd'
