# In-process latency/throughput gate (bench/perf_gate.py) — split out of conformance.yml.
#
# Two fixes over the old cross-build/Actions-cache gate (which false-failed packaging-,
# docs- and TS-only PRs, e.g. #121):
#
#  1. Path filter — perf only runs when performance can actually change: C++ core, the
#     bench harness, CMake, or this workflow. A PR touching only bindings/typescript/**,
#     docs/**, packaging, etc. does NOT run perf.
#  2. Same-runner baseline — on a PR, main's bench_libtracer and the PR's bench_libtracer
#     are BOTH built and timed on the SAME runner in this one job. main's numbers are
#     recorded as the baseline; the PR's are gated against it. GitHub-hosted runners vary
#     ~2x in speed, so a baseline recorded on a fast runner vs a slow PR runner used to
#     false-fail; measuring both here makes absolute-ns speed cancel — only a real
#     relative regression (p50 up >50% / throughput down >34%) fails. perf_gate.py keeps
#     its absolute-floor backstop. No Actions cache feeds the gate any more.
name: perf

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'bench/**'
      - '**/CMakeLists.txt'
      - '**/*.cmake'
      - '.github/workflows/perf.yml'

jobs:
  perf:
    runs-on: ubuntu-24.04
    # contents: write lets the build-to-build tracker (below) push the ns history to the
    # gh-pages branch and post a commit comment when a metric drifts past the soft alert.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need origin/main history to build the same-runner baseline
      - name: Build the PR (candidate) benchmark (Release)
        run: |
          cmake -S bench -B bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bench/build --target bench_libtracer bench_forward_heap -j

      # --- 16KB-RAM zero-heap forward gate (ADR-0038/0039) ------------------------
      # A hard, absolute gate (no baseline needed): the FWD forward hop MUST allocate
      # zero heap. Measured by a global operator-new counter armed around one steady-
      # state on_frame. Fails the build if the forward path ever allocates again.
      - name: Zero-heap forward gate (ADR-0038 §16KB-RAM)
        run: ZEROHEAP_MAX=0 ./bench/build/bench_forward_heap

      # --- PR gate: same-runner baseline ------------------------------------------
      # Build main's bench_libtracer in a worktree on THIS runner, then record its
      # numbers as the baseline and gate the PR's numbers against it. Same hardware,
      # same job -> absolute-ns runner speed cancels; only a real regression fails.
      - name: Build main's benchmark on this runner (baseline)
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags origin main
          git worktree add --detach ../main-baseline origin/main
          cmake -S ../main-baseline/bench -B ../main-baseline/bench/build -DCMAKE_BUILD_TYPE=Release
          cmake --build ../main-baseline/bench/build --target bench_libtracer -j
      - name: Performance gate (same-runner main baseline)
        if: github.event_name == 'pull_request'
        run: |
          echo "== record main (baseline) on this runner =="
          python3 bench/perf_gate.py --bench ../main-baseline/bench/build/bench_libtracer --update-baseline
          echo "== gate PR candidate against the same-runner baseline =="
          python3 bench/perf_gate.py

      # --- main push: refresh the absolute-floor backstop -------------------------
      - name: Performance gate (absolute floors)
        if: github.event_name == 'push'
        run: python3 bench/perf_gate.py --update-baseline

      # --- main push: persist the build-to-build ns history -----------------------
      # perf_gate.py above is the HARD, per-PR relative gate (fails a PR at >50%
      # latency / >34% throughput vs its same-runner main baseline). It does NOT keep a
      # durable series, so slow drift that stays under 50% across many commits is
      # invisible. This step records every main commit's p50 / p99 / ns-per-delivery (all
      # in ns) to a persisted history and charts it, with a TIGHTER 125% soft alert that
      # comments on the offending commit — catching creep the hard gate misses.
      #
      # NOTE: the history + interactive chart live on the `gh-pages` BRANCH (github-
      # action-benchmark's store). This repo's Pages URL is the Sphinx site, which
      # docs.yml deploys from an Actions artifact (Pages source = GitHub Actions), so the
      # two do not collide — but the chart is not served at the Pages URL; view it at the
      # gh-pages branch's dev/bench/index.html (or repoint Pages to the branch if wanted).
      - name: Emit the bench as ns metrics (github-action-benchmark JSON)
        if: github.event_name == 'push'
        run: python3 bench/perf_emit_benchmark.py --bench bench/build/bench_libtracer --out bench/benchmark_output.json
      - name: Track ns history + soft-alert on drift
        if: github.event_name == 'push'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: libtracer in-process latency (ns, smaller is better)
          tool: customSmallerIsBetter
          output-file-path: bench/benchmark_output.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '125%'      # tighter than perf_gate's 150% hard gate: catch creep
          comment-on-alert: true       # auto-comment on the commit that drifted
          fail-on-alert: false         # perf_gate.py remains the hard gate; this is a signal
          alert-comment-cc-users: '@avatarsd'
