#
# Publish the libtracer npm packages (ADR-0033, #98). The TypeScript workspace
# (bindings/typescript) ships three publishable, independently-versioned packages:
# the cross-validated core (@avatarsd-llc/libtracer), the WebSocket transport
# (@avatarsd-llc/libtracer-ws), and the experimental client SDK
# (@avatarsd-llc/libtracer-client, #56). All are ESM, scoped, and publish with
# public access; the private workspace root is skipped by `npm publish --workspaces`.
#
# This is a SEPARATE, standalone workflow: it does NOT alter the required core
# gates (build-test / sanitizers / tsan / format / doxygen) nor the ts.yml unit
# gate. It runs ONLY on a published release, a `v*` tag push, or a manual
# dispatch — never on every push. A manual dispatch defaults to a dry run, so the
# pipeline is exercisable end-to-end without a token or an actual publish.
#
# Requires a repository secret `NPM_TOKEN` (an npm automation token for the
# @avatarsd-llc org) for real publishes; the maintainer sets it. Provenance needs
# `id-token: write` (OIDC) and the public npm registry.
name: publish-npm

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run only (validate the publish, upload nothing)"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: bindings/typescript
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install (clean, from the committed lockfile)
        run: npm ci

      - name: Build the workspace (tsc)
        run: npm run build

      # Manual dispatch with dry-run=true: validate the manifests/tarballs only.
      # No token needed; nothing is uploaded.
      - name: Publish (dry run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run }}
        run: npm publish --workspaces --access public --dry-run

      # Real publish on a release / v* tag, or a manual dispatch with
      # dry-run=false. Private packages (the workspace root) are skipped.
      - name: Publish to npm
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry-run) }}
        run: npm publish --workspaces --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
