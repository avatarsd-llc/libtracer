#
# Guards the single source of truth for the release version. The repo-root
# `VERSION` file is the sole hand-edited version; every publishable artifact is
# versioned in lockstep from it via `tools/sync-version.py` — the PlatformIO /
# Arduino / ESP manifests, the four TypeScript packages (version + internal dep
# ranges), and the Rust crate. This job runs the stamper in --check mode and
# fails if anything has drifted from `VERSION`, so a version bump can never land
# half-applied. (The ROS 2 stub is unreleased and intentionally excluded.)
name: version-consistency

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - library.json
      - integrations/arduino/library.properties
      - integrations/esp-idf/libtracer/idf_component.yml
      - bindings/typescript/packages/**/package.json
      - bindings/rust/Cargo.toml
      - tools/sync-version.py
      - .github/workflows/version-consistency.yml
  pull_request:
    paths:
      - VERSION
      - library.json
      - integrations/arduino/library.properties
      - integrations/esp-idf/libtracer/idf_component.yml
      - bindings/typescript/packages/**/package.json
      - bindings/rust/Cargo.toml
      - tools/sync-version.py
      - .github/workflows/version-consistency.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Package manifests match the VERSION file
        run: python3 tools/sync-version.py --check
