#
# Regression gate for the Wireshark dissector (tools/wireshark/libtracer.lua).
#
# The dissector is a debugging tool, not a conforming core — but it decodes the
# same wire bytes, so it is held to the same corpus: it must decode every frame
# under tests/conformance/vectors/v1/ to agree with each vector's expected.json,
# verify the trailer CRCs, and flag the reserved-bit reject vectors as INVALID.
# The harness drives the ACTUAL Lua file (via its --decode-json CLI), so there is
# no separate reimplementation to drift.
name: wireshark-dissector

on:
  push:
    branches: [main]
    paths:
      - 'tools/wireshark/**'
      - 'tests/conformance/vectors/**'
      - '.github/workflows/wireshark-dissector.yml'
  pull_request:
    paths:
      - 'tools/wireshark/**'
      - 'tests/conformance/vectors/**'
      - '.github/workflows/wireshark-dissector.yml'

jobs:
  dissector:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua (interpreter + compiler)
        run: sudo apt-get update && sudo apt-get install -y lua5.4
      - name: Syntax-check the dissector (all Lua versions must parse it)
        run: luac5.4 -p tools/wireshark/libtracer.lua
      - name: Decode every conformance vector through the dissector
        run: python3 tools/wireshark/tests/run_tests.py -v
