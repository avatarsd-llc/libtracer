#
# C++ <-> TypeScript transport_ws INTEROP end-to-end job (#54). Builds the C++
# `ws_interop_server` helper binary (a real `tr::net::transport_ws_server`) and
# runs the TypeScript transport-ws interop test against it over a live socket: a
# genuine RFC 6455 101 handshake, a MASKED TS client frame in, an UNMASKED C++
# server frame back. This proves the published @avatarsd-llc/libtracer-ws client
# actually interoperates with the C++ server, beyond the codec-vector agreement.
#
# This is a SEPARATE, standalone workflow (mirroring can-vcan-e2e.yml / ts.yml):
# the required core gates (build-test / sanitizers / tsan / format / doxygen) must
# never depend on a Node toolchain, and the TS gates must never depend on a C++
# build. Path-filtered to the C++ transport, the TypeScript workspace, and this
# file, so it only runs when one of those changes.
name: ws-interop

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "bindings/typescript/**"
      - ".github/workflows/ws-interop.yml"
  pull_request:
    paths:
      - "core/**"
      - "bindings/typescript/**"
      - ".github/workflows/ws-interop.yml"
  workflow_dispatch:

jobs:
  ws-interop:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build the C++ ws_interop_server helper binary
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build core/build --target ws_interop_server -j

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install + build the TypeScript workspace
        working-directory: bindings/typescript
        run: |
          npm ci
          npm run build

      - name: Run the TS <-> C++ transport_ws interop test over a real socket
        working-directory: bindings/typescript/packages/transport-ws
        env:
          LIBTRACER_WS_INTEROP_SERVER: ${{ github.workspace }}/core/build/tests/ws_interop_server
        run: npm test

  # RFC-0004 client interop (#56): the TypeScript LibtracerClient drives all five
  # path-addressed operations (read / write / await / readField / subscribe) over
  # real FWD frames against a live C++ graph-backed node (fwd_node_server) over a
  # genuine ws socket, and decodes the source-routed FWD{REPLY} / producer delivery
  # — the web-UI<->device proof, one layer above the transport_ws interop above.
  # A SEPARATE, standalone job for the same reason: the required core gates must
  # never depend on a Node toolchain, and a client-FWD failure must read distinctly
  # from a transport-ws failure. Same path-filter as this whole workflow.
  fwd-interop:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build the C++ fwd_node_server helper binary
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build core/build --target fwd_node_server -j

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install + build the TypeScript workspace
        working-directory: bindings/typescript
        run: |
          npm ci
          npm run build

      - name: Run the TS client <-> C++ FWD node interop test over a real socket
        working-directory: bindings/typescript/packages/client
        env:
          LIBTRACER_FWD_NODE_SERVER: ${{ github.workspace }}/core/build/tests/fwd_node_server
        run: npm test

  # Differential fuzzer for the RFC 6455 frame DECODER — the network-facing attack
  # surface that parses untrusted bytes (FIN/opcode, 7/16/64-bit length, client
  # mask, the overflow-safe 64-bit-over-long path) BEFORE the TLV layer. Builds the
  # C++ ws_fuzz_harness, builds the TS codec, and feeds thousands of well-formed +
  # adversarial frames to BOTH decoders, asserting they agree and neither crashes
  # (tests/conformance/ws_diff_fuzz.py). Standalone, like the interop job above — it
  # must never gate the required core jobs (build-test / sanitizers / format /
  # doxygen) on a Node toolchain.
  ws-diff-fuzz:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build the C++ ws_fuzz_harness
        run: |
          cmake -S core -B core/build -DBUILD_TESTING=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build core/build --target ws_fuzz_harness -j

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bindings/typescript/package-lock.json

      - name: Install + build the TypeScript workspace
        working-directory: bindings/typescript
        run: |
          npm ci
          npm run build

      - name: Differential-fuzz the C++ and TS ws frame decoders
        env:
          LIBTRACER_WS_FUZZ_HARNESS: ${{ github.workspace }}/core/build/tests/ws_fuzz_harness
        run: python3 tests/conformance/ws_diff_fuzz.py -n 2000
